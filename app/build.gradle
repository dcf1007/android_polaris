plugins {
    id 'com.android.application'
}

android {
    namespace 'com.dcf1007.androidpolaris'
    compileSdk 35

    defaultConfig {
        applicationId 'com.dcf1007.androidpolaris'
        minSdk 23
        targetSdk 35
        versionCode 4
        versionName '0.2.2'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Native USB OTG / UVC preview backend.
    //
    // Version 3.2.7 is pinned instead of 3.3.3 because the 3.3.3 JitPack POM
    // resolves libausbc but fails to resolve its transitive libuvc module on
    // GitHub Actions.
    //
    // The high-level AUSBC artifact also declares UI/image helper libraries that
    // are not used by this app's UVC-only preview path. GitHub Actions resolved
    // those helper artifacts through JitPack and received HTTP 401 responses, so
    // they are excluded here. The app uses only the USB camera client/backend
    // classes and draws its own native Android UI and reticle overlay.
    implementation('com.github.jiangdongguo.AndroidUSBCamera:libausbc:3.2.7') {
        exclude group: 'com.gyf.immersionbar', module: 'immersionbar'
        exclude group: 'com.zlc.glide', module: 'webpdecoder'
    }
}