plugins {
    id 'com.android.application'
}

android {
    namespace 'com.dcf1007.androidpolaris'
    compileSdk 35

    defaultConfig {
        applicationId 'com.dcf1007.androidpolaris'
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName '0.2.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Native USB OTG / UVC preview backend. Version 3.2.7 is pinned instead of
    // 3.3.3 because the 3.3.3 JitPack POM resolves libausbc but fails to resolve
    // its transitive libuvc module on GitHub Actions. The upstream changelog marks
    // 3.2.7 as the Android-S-compatible direct-dependency release line.
    implementation 'com.github.jiangdongguo.AndroidUSBCamera:libausbc:3.2.7'
}
