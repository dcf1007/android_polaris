plugins {
    id 'com.android.application'
}

android {
    namespace 'com.dcf1007.androidpolaris'
    compileSdk 35

    defaultConfig {
        applicationId 'com.dcf1007.androidpolaris'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '0.2.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Native USB OTG / UVC preview backend. This is the same class of backend used
    // by dedicated USB-camera applications when Android does not expose the camera
    // through Camera2 as an external camera.
    implementation 'com.github.jiangdongguo.AndroidUSBCamera:libausbc:3.3.3'
}
